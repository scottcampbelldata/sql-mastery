        - heading "Zero SQL 1" [level=2] [ref=f21e35]
        - generic [ref=f21e36]:
          - generic [ref=f21e37]: "Database: chinook"
          - generic [ref=f21e38]: Session 1 of 144
        - paragraph [ref=f21e39]: What is a database? List the user tables in Chinook so you can see what raw material SQL can query.
        - region "Lesson brief" [ref=f21e40]:
          - generic [ref=f21e41]:
            - generic [ref=f21e42]: What you are learning
            - paragraph [ref=f21e43]: A database is a collection of related tables. A table is rows and columns stored so you can ask precise questions.
          - generic [ref=f21e44]:
            - generic [ref=f21e45]: Why it matters
            - paragraph [ref=f21e46]: Before you write SQL, you need to know what tables exist. Senior analysts do not guess; they inspect.
          - generic [ref=f21e47]:
            - generic [ref=f21e48]: Mental model
            - paragraph [ref=f21e49]: Think of the database as a workbook, each table as a spreadsheet tab, each row as a record, and each column as one attribute.
          - generic [ref=f21e50]:
            - generic [ref=f21e51]: Worked example
            - paragraph [ref=f21e52]: To inspect tables, query information_schema.tables and exclude PostgreSQL system schemas.
          - generic [ref=f21e53]:
            - generic [ref=f21e54]: How to approach it
            - list [ref=f21e55]:
              - listitem [ref=f21e56]: Ask PostgreSQL for its list of tables.
              - listitem [ref=f21e57]: Remove system tables from pg_catalog and information_schema.
              - listitem [ref=f21e58]: Sort the result so the schema is easy to scan.
          - generic [ref=f21e59]:
            - generic [ref=f21e60]: Common mistakes
            - list [ref=f21e61]:
              - listitem [ref=f21e62]: Starting with SELECT * from a guessed table name.
              - listitem [ref=f21e63]: Ignoring schema names when a database has multiple schemas.
              - listitem [ref=f21e64]: Treating the database like one giant table.
          - generic [ref=f21e65]:
            - generic [ref=f21e66]: Interview angle
            - paragraph [ref=f21e67]: "In an interview, schema recon shows maturity: you learn the data shape before writing business logic."
        - button "Hint" [ref=f21e68] [cursor=pointer]
        - generic [ref=f21e69]:
          - generic [ref=f21e70]:
            - generic [ref=f21e71]: Your SQL
            - generic [ref=f21e72]: chinook
          - textbox "Your SQL" [ref=f21e73]:
            - /placeholder: SELECT table_schema, table_name
            - text: SELECT table_schema, table_name FROM information_schema.tables WHERE table_schema NOT IN ('pg_catalog', 'information_schema') AND table_type = 'BASE TABLE' ORDER BY table_schema, table_name;
