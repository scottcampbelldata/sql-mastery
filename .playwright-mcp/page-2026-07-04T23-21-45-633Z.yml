        - heading "Zero SQL 1" [level=2] [ref=f20e35]
        - generic [ref=f20e36]:
          - generic [ref=f20e37]: "Database: chinook"
          - generic [ref=f20e38]: Session 1 of 144
        - paragraph [ref=f20e39]: What is a database? List the user tables in Chinook so you can see what raw material SQL can query.
        - region "Lesson brief" [ref=f20e40]:
          - generic [ref=f20e41]:
            - generic [ref=f20e42]: What you are learning
            - paragraph [ref=f20e43]: A database is a collection of related tables. A table is rows and columns stored so you can ask precise questions.
          - generic [ref=f20e44]:
            - generic [ref=f20e45]: Why it matters
            - paragraph [ref=f20e46]: Before you write SQL, you need to know what tables exist. Senior analysts do not guess; they inspect.
          - generic [ref=f20e47]:
            - generic [ref=f20e48]: Mental model
            - paragraph [ref=f20e49]: Think of the database as a workbook, each table as a spreadsheet tab, each row as a record, and each column as one attribute.
          - generic [ref=f20e50]:
            - generic [ref=f20e51]: Worked example
            - paragraph [ref=f20e52]: To inspect tables, query information_schema.tables and exclude PostgreSQL system schemas.
          - generic [ref=f20e53]:
            - generic [ref=f20e54]: How to approach it
            - list [ref=f20e55]:
              - listitem [ref=f20e56]: Ask PostgreSQL for its list of tables.
              - listitem [ref=f20e57]: Remove system tables from pg_catalog and information_schema.
              - listitem [ref=f20e58]: Sort the result so the schema is easy to scan.
          - generic [ref=f20e59]:
            - generic [ref=f20e60]: Common mistakes
            - list [ref=f20e61]:
              - listitem [ref=f20e62]: Starting with SELECT * from a guessed table name.
              - listitem [ref=f20e63]: Ignoring schema names when a database has multiple schemas.
              - listitem [ref=f20e64]: Treating the database like one giant table.
          - generic [ref=f20e65]:
            - generic [ref=f20e66]: Interview angle
            - paragraph [ref=f20e67]: "In an interview, schema recon shows maturity: you learn the data shape before writing business logic."
