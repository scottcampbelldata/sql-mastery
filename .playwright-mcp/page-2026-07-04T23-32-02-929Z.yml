          - generic [ref=f23e38]: Session 1 of 144
        - paragraph [ref=f23e39]: What is a database? List the user tables in Chinook so you can see what raw material SQL can query.
        - region "Lesson brief" [ref=f23e40]:
          - generic [ref=f23e41]:
            - generic [ref=f23e42]: What you are learning
            - paragraph [ref=f23e43]: A database is a collection of related tables. A table is rows and columns stored so you can ask precise questions.
          - generic [ref=f23e44]:
            - generic [ref=f23e45]: Why it matters
            - paragraph [ref=f23e46]: Before you write SQL, you need to know what tables exist. Senior analysts do not guess; they inspect.
          - generic [ref=f23e47]:
            - generic [ref=f23e48]: Mental model
            - paragraph [ref=f23e49]: Think of the database as a workbook, each table as a spreadsheet tab, each row as a record, and each column as one attribute.
          - generic [ref=f23e50]:
            - generic [ref=f23e51]: Worked example
            - paragraph [ref=f23e52]: To inspect tables, query information_schema.tables and exclude PostgreSQL system schemas.
          - generic [ref=f23e53]:
            - generic [ref=f23e54]: How to approach it
            - list [ref=f23e55]:
              - listitem [ref=f23e56]: Ask PostgreSQL for its list of tables.
              - listitem [ref=f23e57]: Remove system tables from pg_catalog and information_schema.
              - listitem [ref=f23e58]: Sort the result so the schema is easy to scan.
          - generic [ref=f23e59]:
            - generic [ref=f23e60]: Common mistakes
            - list [ref=f23e61]:
              - listitem [ref=f23e62]: Starting with SELECT * from a guessed table name.
              - listitem [ref=f23e63]: Ignoring schema names when a database has multiple schemas.
              - listitem [ref=f23e64]: Treating the database like one giant table.
          - generic [ref=f23e65]:
            - generic [ref=f23e66]: Interview angle
            - paragraph [ref=f23e67]: "In an interview, schema recon shows maturity: you learn the data shape before writing business logic."
