        - heading "Zero SQL 1" [level=2] [ref=f23e120]
        - generic [ref=f23e121]:
          - generic [ref=f23e122]: "Database: chinook"
          - generic [ref=f23e123]: Session 1 of 144
        - paragraph [ref=f23e124]: What is a database? List the user tables in Chinook so you can see what raw material SQL can query.
        - region "Lesson brief" [ref=f23e125]:
          - generic [ref=f23e126]:
            - generic [ref=f23e127]: What you are learning
            - paragraph [ref=f23e128]: A database is a collection of related tables. A table is rows and columns stored so you can ask precise questions.
          - generic [ref=f23e129]:
            - generic [ref=f23e130]: Why it matters
            - paragraph [ref=f23e131]: Before you write SQL, you need to know what tables exist. Senior analysts do not guess; they inspect.
          - generic [ref=f23e132]:
            - generic [ref=f23e133]: Mental model
            - paragraph [ref=f23e134]: Think of the database as a workbook, each table as a spreadsheet tab, each row as a record, and each column as one attribute.
          - generic [ref=f23e135]:
            - generic [ref=f23e136]: Worked example
            - paragraph [ref=f23e137]: To inspect tables, query information_schema.tables and exclude PostgreSQL system schemas.
          - generic [ref=f23e138]:
            - generic [ref=f23e139]: How to approach it
            - list [ref=f23e140]:
              - listitem [ref=f23e141]: Ask PostgreSQL for its list of tables.
              - listitem [ref=f23e142]: Remove system tables from pg_catalog and information_schema.
              - listitem [ref=f23e143]: Sort the result so the schema is easy to scan.
          - generic [ref=f23e144]:
            - generic [ref=f23e145]: Common mistakes
            - list [ref=f23e146]:
              - listitem [ref=f23e147]: Starting with SELECT * from a guessed table name.
              - listitem [ref=f23e148]: Ignoring schema names when a database has multiple schemas.
              - listitem [ref=f23e149]: Treating the database like one giant table.
          - generic [ref=f23e150]:
            - generic [ref=f23e151]: Interview angle
            - paragraph [ref=f23e152]: "In an interview, schema recon shows maturity: you learn the data shape before writing business logic."
        - button "Hint" [ref=f23e153] [cursor=pointer]
        - generic [ref=f23e154]:
          - generic [ref=f23e155]:
            - generic [ref=f23e156]: Your SQL
            - generic [ref=f23e157]: chinook
          - textbox "Your SQL" [ref=f23e158]:
            - /placeholder: SELECT table_schema, table_name
            - text: SELECT table_schema, table_name FROM information_schema.tables WHERE table_schema NOT IN ('pg_catalog', 'information_schema') AND table_type = 'BASE TABLE' ORDER BY table_schema, table_name;
