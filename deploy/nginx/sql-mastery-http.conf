# =============================================================================
# http{}-context settings for the SQL Mastery API.
# Drop this in /etc/nginx/conf.d/ (Debian/Ubuntu include it from nginx.conf's
# http{} block). It defines the rate/connection-limit zones the vhost references
# and hides the nginx version banner. Without this file, `nginx -t` fails on the
# vhost with "unknown limit_req zone sqlmastery_api".
# =============================================================================

# Hide the nginx version from responses and error pages.
server_tokens off;

# Per-IP request rate: ~1 req/sec. This fronts an UNAUTHENTICATED arbitrary-SQL
# API and each query can hold a DB connection for up to 60s, so keep it tight.
limit_req_zone  $binary_remote_addr zone=sqlmastery_api:10m rate=1r/s;

# Per-IP concurrent-connection cap: bounds how many long-running queries one IP
# can hold at once (rate limiting alone does not cap concurrency).
limit_conn_zone $binary_remote_addr zone=sqlmastery_conn:10m;

# Return 429 (not the default 503) when a client trips either limit.
limit_req_status  429;
limit_conn_status 429;
