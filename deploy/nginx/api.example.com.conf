# =============================================================================
# SQL Mastery API - production nginx reverse proxy (vhost)
#
# The Node/Express app runs the SQL Mastery API bound to 127.0.0.1:3000
# (HOST=127.0.0.1, PORT=3000). The front end is hosted separately on Cloudflare
# Pages, so this vhost serves ONLY the API on its own subdomain and proxies
# everything to the local Node process.
#
# Install:
#   1. Put deploy/nginx/sql-mastery-http.conf in /etc/nginx/conf.d/ (it defines
#      the rate-limit / connection-limit zones this vhost references, and
#      server_tokens off). Those zones MUST live in the http{} context.
#   2. Put this file in /etc/nginx/sites-available/api.example.com.conf and
#      symlink it into /etc/nginx/sites-enabled/.
#   3. nginx -t && systemctl reload nginx
#
# Placeholders to replace: api.example.com (subdomain), /opt/sql-mastery (app dir).
#
# SECURITY: /api/query and /api/check run ARBITRARY read-only SQL with NO auth.
# The rate/conn limits below are the main network-level brake on abuse; keep them,
# and pair them with a read-only Postgres role and (ideally) Cloudflare Access.
# =============================================================================

# ----- Port 80: ACME challenge + redirect everything else to HTTPS -----------
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    # certbot HTTP-01 webroot:
    #   certbot certonly --webroot -w /opt/sql-mastery/public -d api.example.com
    location /.well-known/acme-challenge/ {
        root /opt/sql-mastery/public;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- Port 443: the API vhost, TLS-terminated -------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.example.com;

    # TLS (Let's Encrypt / certbot managed cert paths).
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security response headers (kept at server level; no add_header in location
    # below, so these are inherited there - if you ever add one in location, you
    # must repeat these there too, or nginx drops them).
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/sql-mastery-api.access.log;
    error_log  /var/log/nginx/sql-mastery-api.error.log;

    # Match Express's express.json({ limit: '1mb' }); larger bodies 413 at nginx.
    client_max_body_size 1m;

    location / {
        # Tight limits: unauthenticated arbitrary-SQL endpoint where a single query
        # can hold a DB connection for up to the 60s statement timeout.
        limit_req  zone=sqlmastery_api burst=5 nodelay;   # ~1 req/s sustained per IP
        limit_conn sqlmastery_conn 4;                     # <=4 concurrent per IP

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # REPLACE (not append) X-Forwarded-For: nginx is the only proxy in front of
        # Node, so trust only the real connection IP. Using $proxy_add_x_forwarded_for
        # here would let a client forge X-Forwarded-For and spoof its apparent IP.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Headroom over the 60s statement timeout (query + JSON serialization + slack).
        proxy_connect_timeout 10s;
        proxy_read_timeout    90s;
        proxy_send_timeout    90s;

        # NO CORS headers here on purpose: the Node app sets Access-Control-* from
        # SQL_MASTERY_ALLOWED_ORIGINS. Adding them here would duplicate/break CORS.
    }
}
